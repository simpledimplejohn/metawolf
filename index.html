<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Gloock&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #33a3ff; /* Classic warm tone background */
            transition: background-image 0.5s ease;
            background-size: cover;
            background-position: center;
        }
        #container {
            position: relative;
            width: 100%;
            height: auto;
            max-width: 1396px;
            margin: auto;
        }
        #splash-image {
            width: 100%;
            height: auto;
        }
        .metawolf {
            position: absolute;
            color: #e63946; /* Muted yellow for a vintage look */
            font-size: 2.5vw; /* Responsive font size */
            font-weight: bold;
            text-shadow: 
                -2px -2px 0 #000, 
                 2px -2px 0 #000, 
                -2px  2px 0 #000, 
                 2px  2px 0 #000;
            font-family: 'Gloock', serif; /* Vintage serif font */
            white-space: nowrap;
            cursor: pointer;
            transition: color 0.3s ease;
            
        }
        .title {
            position: absolute;
            color: #e63946; /* Deep red color typical of retro posters */
            font-size: 4vw; /* Responsive font size */
            font-weight: bold;
            font-family: 'Playfair Display', serif; /* Elegant serif font */
            white-space: nowrap;
            cursor: pointer;
            text-shadow: 
                -3px -3px 0 #000, 
                 3px -3px 0 #000, 
                -3px  3px 0 #000, 
                 3px  3px 0 #000;
            transition: color 0.3s ease;
            
        }
        .metawolf:hover {
            color: #ffd700; /* Brighter yellow on hover */
        }
        #about {
            top: 35%;
            left: 35%;
        }
        #artists {
            top: 35%;
            left: 45%;
        }
        #clients {
            top: 35%;
            left: 55%;
        }
        #contacts {
            top: 35%;
            left: 65%;
        }
        #title {
            top: 36%;
            left: 1%;
        }
        @media (max-width: 900px) {
            .title {
                font-size: 6vw
            }
            .metawolf {
                font-size: 6vw; /* Smaller font size for small screens */
            }
            #about {
                top: 48%;
                left: 20%;
            }
            #artists {
                top: 58%;
                left: 20%;
            }
            #clients {
                top: 68%;
                left: 20%;
            }
            #contacts {
                top: 78%;
                left: 20%;
            }
        }
    </style>
   
</head>
<body>
    <div id="container">
        <img id="splash-image" src="images/romulusremus_1.png" alt="Splash Image">
        <a href="about.html" class="metawolf" id="about">about</a>
        <a href="artists.html" class="metawolf" id="artists">artists</a>
        <a href="clients.html" class="metawolf" id="clients">clients</a>
        <a href="contacts.html" class="metawolf" id="contacts">contacts</a>
        <a href="" class="title" id="title">METAWOLF</a>
    </div>
</body>

</html>
